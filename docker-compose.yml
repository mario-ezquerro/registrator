version: '3.8'

services:
  registrator:
    image: marioezquerro/registrator:v7.4.23
    command: -healthcheck-port=8080 consul://consul:8500
    network_mode: "host"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
