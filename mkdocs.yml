site_name: Registrator
site_url: https://mario-ezquerro.github.io/registrator/
site_description: Service registry bridge for Docker - supports Consul, etcd and SkyDNS 2
repo_url: https://github.com/mario-ezquerro/registrator
repo_name: mario-ezquerro/registrator
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - 'Inicio': index.md
  - 'Guía de Usuario':
    - 'Quickstart': user/quickstart.md
    - 'Run Reference': user/run.md
    - 'Service Model': user/services.md
    - 'Registry Backends': user/backends.md
    - 'FAQ': user/faq.md
  - 'Guía de Desarrollador':
    - 'Contributing Backends': dev/backends.md
    - 'Staging Releases': dev/releases.md
